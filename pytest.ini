[pytest]
minversion = 7.0
addopts = --tb=short
testpaths = tests
pythonpath = src
filterwarnings =
    ignore:setting remote_server_addr in RemoteConnection\(\) is deprecated.*:DeprecationWarning:appium.webdriver.appium_connection
    ignore:get_timeout\(\) in RemoteConnection is deprecated.*:DeprecationWarning:appium.webdriver.appium_connection

markers =
    backend: Backend tests (MongoDB)
    backend_check: Backend gate checks that validate business rules and may fail the main suite
    backend_monitoring: Backend monitoring/reporting scenarios kept outside the main gate suite
    backend_research: Backend exploratory or one-off analytical scenarios not included in default runs
    web: Web tests (Playwright)
    mobile: Mobile tests (Appium)
    smoke: Smoke tests
    regression: Regression tests
    interactive_mobile: Mobile tests with interactive debug menu
    flow: Mobile end-to-end flow tests
